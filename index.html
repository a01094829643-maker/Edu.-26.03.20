<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Foundation - 기초에서 디자인까지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; word-break: keep-all; }
        .heavy-black { font-weight: 900; letter-spacing: -0.05em; }
        .bg-grid {
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body class="bg-grid">

    <section class="min-h-screen flex items-center justify-center px-6">
        <div class="max-w-4xl text-center">
            <h1 class="text-7xl md:text-8xl heavy-black mb-10 text-stone-900 leading-tight">
                당신의 감각을<br>
                <span class="text-blue-600">깨우는 기술</span>
            </h1>
            <p class="text-2xl font-bold text-stone-600 mb-12">
                "기초만 다듬어도 디자인할 수 있습니다!"<br>
                실무 디자인 역량으로 직결되는 가장 확실한 기초 커리큘럼.
            </p>
            <div class="flex flex-col md:flex-row gap-6 justify-center">
                <button class="bg-[#0047FF] text-white px-12 py-6 text-xl font-black border-4 border-black shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 transition-all">
                    커리큘럼 확인하기
                </button>
                <button class="bg-[#FF5C00] text-white px-12 py-6 text-xl font-black border-4 border-black shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 transition-all">
                    수강생 작품 보기
                </button>
            </div>
        </div>
    </section>

    </body>
</html>
